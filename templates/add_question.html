{% extends "base.html" %}
{% block title %}Add Question - Admin{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-7">
    <div class="d-flex align-items-center gap-3 mb-4">
      <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-secondary btn-sm">← Back</a>
      <h4 style="margin:0; font-family:'Space Grotesk',sans-serif;">➕ Add New Question</h4>
    </div>
    <div class="card">
      <div class="card-body p-4">
        <form method="POST">
          <div class="mb-4">
            <label class="form-label">Question Text</label>
            <textarea name="question_text" class="form-control" rows="3" placeholder="Enter your question here..." required></textarea>
          </div>
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label">Option A</label>
              <input type="text" name="option_a" class="form-control" placeholder="Option A" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Option B</label>
              <input type="text" name="option_b" class="form-control" placeholder="Option B" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Option C</label>
              <input type="text" name="option_c" class="form-control" placeholder="Option C" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Option D</label>
              <input type="text" name="option_d" class="form-control" placeholder="Option D" required>
            </div>
          </div>
          <div class="row g-3 mb-4">
            <div class="col-md-6">
              <label class="form-label">Correct Answer</label>
              <select name="correct_answer" class="form-select" required>
                <option value="">-- Select --</option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
                <option value="D">D</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Category</label>
              <input type="text" name="category" class="form-control" placeholder="e.g., Security, Web" value="General">
            </div>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success">✅ Add Question</button>
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
